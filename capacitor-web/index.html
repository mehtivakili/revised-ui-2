<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>همیار دوربین</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Tahoma, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #e2f2fb, #f8fbfd);
        color: #1d2933;
      }

      main {
        width: min(360px, 100%);
        display: grid;
        gap: 12px;
        padding: 22px;
        text-align: center;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid #cde4f2;
        border-radius: 18px;
        box-shadow: 0 18px 44px rgba(23, 109, 168, 0.12);
      }

      h1 {
        margin: 0;
        color: #0f5f99;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #627888;
        line-height: 1.9;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>همیار دوربین</h1>
      <p>در حال اتصال به نسخه آنلاین برنامه...</p>
    </main>
  </body>
</html>
